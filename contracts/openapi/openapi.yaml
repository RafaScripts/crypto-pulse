openapi: 3.0.3
info:
  title: Crypto-Pulse API
  version: 0.2.0
servers:
  - url: http://localhost:3000
paths:
  /api/v1/health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/v1/auth/login:
    post:
      summary: Login com email e senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /api/v1/me:
    get:
      summary: Usuário autenticado
      responses:
        '200':
          description: OK
  /api/v1/opportunities:
    get:
      summary: Listar oportunidades de arbitragem
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArbitrageOpportunity'
  /api/v1/opportunities/{id}:
    get:
      summary: Obter oportunidade por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /api/v1/preferences:
    get:
      summary: Obter preferências do usuário
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
    put:
      summary: Atualizar preferências do usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserPreferencesRequest'
      responses:
        '200':
          description: Updated
  /api/v1/alert-channels:
    get:
      summary: Listar canais de alerta
      responses:
        '200':
          description: OK
    post:
      summary: Criar canal de alerta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertChannelRequest'
      responses:
        '201':
          description: Created
  /api/v1/exchanges/status:
    get:
      summary: Status operacional das exchanges
      responses:
        '200':
          description: OK
components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
    UserPreferences:
      type: object
      properties:
        min_profit_threshold_pct:
          type: number
        notifications_enabled:
          type: boolean
        preferred_pairs:
          type: array
          items:
            type: string
        preferred_exchanges:
          type: array
          items:
            type: string
    UpdateUserPreferencesRequest:
      type: object
      properties:
        min_profit_threshold_pct:
          type: number
        notifications_enabled:
          type: boolean
        preferred_pairs:
          type: array
          items:
            type: string
        preferred_exchanges:
          type: array
          items:
            type: string
    CreateAlertChannelRequest:
      type: object
      required: [type, target]
      properties:
        type:
          type: string
          enum: [telegram]
        target:
          type: string
    ArbitrageOpportunity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        buy_exchange:
          type: string
        sell_exchange:
          type: string
        buy_price:
          type: number
        sell_price:
          type: number
        gross_spread_pct:
          type: number
        total_fees_pct:
          type: number
        net_profit_pct:
          type: number
        estimated_profit_amount:
          type: number
        detected_at:
          type: string
          format: date-time
        status:
          type: string
