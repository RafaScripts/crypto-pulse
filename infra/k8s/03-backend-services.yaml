# API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: crypto-pulse-api-gateway:latest
        imagePullPolicy: Never # Usa a imagem buildada localmente
        envFrom:
        - configMapRef:
            name: crypto-pulse-config
        - configMapRef:
            name: crypto-pulse-env
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 3001
  selector:
    app: api-gateway

