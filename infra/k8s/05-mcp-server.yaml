apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
      - name: mcp-server
        image: crypto-pulse-mcp-server:latest
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: crypto-pulse-config
        - configMapRef:
            name: crypto-pulse-env
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
spec:
  selector:
    app: mcp-server
  ports:
    - protocol: TCP
      port: 3004
      targetPort: 3004
