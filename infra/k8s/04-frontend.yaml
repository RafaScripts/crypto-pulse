apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
    spec:
      containers:
      - name: web-dashboard
        image: crypto-pulse-web:latest
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: crypto-pulse-config
        - configMapRef:
            name: crypto-pulse-env
        env:
        - name: NEXT_PUBLIC_WS_URL
          value: "wss://cryptopulse.rafascripts.dev.br"
        - name: NEXT_PUBLIC_API_URL
          value: "https://cryptopulse.rafascripts.dev.br"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: web-dashboard
spec:
  type: NodePort
  ports:
  - port: 3000
    nodePort: 30000
  selector:
    app: web-dashboard
